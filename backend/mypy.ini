[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False  # Allow for gradual adoption
disallow_incomplete_defs = False
check_untyped_defs = True
disallow_untyped_decorators = False
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = False
warn_unreachable = False
strict_equality = False

# Reduce verbosity by ignoring missing imports and following imports silently
ignore_missing_imports = True
follow_imports = silent
show_error_codes = True

# Don't check these common third-party packages
[mypy-django.*]
ignore_missing_imports = True

[mypy-rest_framework.*]
ignore_missing_imports = True

[mypy-drf_spectacular.*]
ignore_missing_imports = True

[mypy-celery.*]
ignore_missing_imports = True

[mypy-pywbpush.*]
ignore_missing_imports = True

# Your app modules - enable stricter checking
[mypy-accounts.*]
disallow_untyped_defs = True
warn_return_any = True

[mypy-api.*]
disallow_untyped_defs = True
warn_return_any = True

[mypy-notification.*]
disallow_untyped_defs = True
warn_return_any = True

[mypy-config.*]
disallow_untyped_defs = True
warn_return_any = True

# Scripts and management commands
[mypy-manage.py]
ignore_errors = True

[mypy-*/migrations/*]
ignore_errors = True

# Test files
[mypy-*/tests.py]
disallow_untyped_defs = False
